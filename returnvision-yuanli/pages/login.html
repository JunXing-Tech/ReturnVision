/* ============================================================
   退运智录 · 源力（Volcengine）设计系统品牌样式
   基于 dl_builtin_volcengine token 生成，brand prefix: yuanli
   中文优先字体 + 品牌蓝主色 + 完整状态色 ramp + 5 级阴影
   ============================================================ */

:root {
  /* ===== 语义色（Tailwind 桥接，fill-html-head.mjs 检测）===== */
  --yuanli-background: #ffffff;
  --yuanli-foreground: #0c0d0e;
  --yuanli-card: #ffffff;
  --yuanli-card-foreground: #0c0d0e;
  --yuanli-popover: #ffffff;
  --yuanli-popover-foreground: #0c0d0e;
  --yuanli-primary: #1664ff;          /* 源力品牌蓝 primary-6 */
  --yuanli-primary-foreground: #ffffff;
  --yuanli-secondary: #f6f8fa;        /* color-bg-4 */
  --yuanli-secondary-foreground: #0c0d0e;
  --yuanli-muted: #f6f8fa;
  --yuanli-muted-foreground: #737a87; /* color-text-3 */
  --yuanli-accent: #ebf1ff;           /* primary-2 浅蓝强调底 */
  --yuanli-accent-foreground: #114ab9;/* primary-8 */
  --yuanli-destructive: #ee3f38;      /* danger-5 */
  --yuanli-destructive-foreground: #ffffff;
  --yuanli-border: #dde2e9;           /* border-2 */
  --yuanli-input: #dde2e9;
  --yuanli-ring: #387bff;             /* primary-5 焦点环 */

  /* ===== 图表 5 色（区分退货趋势系列）===== */
  --yuanli-chart-1: #387bff;          /* 蓝 主系列 */
  --yuanli-chart-2: #7ccd94;          /* 绿 完成 */
  --yuanli-chart-3: #f0a50f;          /* 黄 待确认 */
  --yuanli-chart-4: #ff706d;          /* 红 失败 */
  --yuanli-chart-5: #86909c;          /* 灰 辅助 */

  /* ===== 侧边栏 ===== */
  --yuanli-sidebar: #fcfdfe;          /* color-bg-2 */
  --yuanli-sidebar-foreground: #0c0d0e;
  --yuanli-sidebar-primary: #1664ff;
  --yuanli-sidebar-primary-foreground: #ffffff;
  --yuanli-sidebar-accent: #f6f8fa;
  --yuanli-sidebar-accent-foreground: #0c0d0e;
  --yuanli-sidebar-border: #eaedf1;

  /* ===== 状态色完整 ramp（退运智录多状态高频核对）===== */
  --yuanli-success: #309256;          /* success-5 */
  --yuanli-success-strong: #2a814b;   /* success-6 */
  --yuanli-success-subtle: #eef9f1;   /* success-1 浅底徽章 */
  --yuanli-success-foreground: #ffffff;

  --yuanli-warning: #bd7e00;          /* warning-6 */
  --yuanli-warning-strong: #d08d06;   /* warning-5 */
  --yuanli-warning-subtle: #fef8eb;   /* warning-1 浅底徽章 */
  --yuanli-warning-foreground: #ffffff;

  --yuanli-danger: #ee3f38;           /* danger-5 */
  --yuanli-danger-strong: #d7312a;    /* danger-6 */
  --yuanli-danger-subtle: #fdf5f5;    /* danger-1 浅底徽章 */
  --yuanli-danger-foreground: #ffffff;

  --yuanli-info: #1664ff;
  --yuanli-info-subtle: #ebf1ff;

  /* ===== 中性色阶（源力 grey/text/bg 体系）===== */
  --yuanli-color-text-1: #0c0d0e;     /* 主文字 */
  --yuanli-color-text-2: #42464e;     /* 次级文字 */
  --yuanli-color-text-3: #737a87;     /* 辅助文字/标签 */
  --yuanli-color-text-4: #c7ccd6;     /* 占位/禁用 */

  --yuanli-color-bg-1: #ffffff;       /* 卡片底 */
  --yuanli-color-bg-2: #fcfdfe;       /* 侧边栏底 */
  --yuanli-color-bg-3: #fafbfc;       /* 次级容器 */
  --yuanli-color-bg-4: #f6f8fa;       /* 强调态底/muted */
  --yuanli-color-bg-5: #f1f3f5;       /* hover 底 */

  --yuanli-border-1: #eaedf1;         /* 极淡边框 */
  --yuanli-border-2: #dde2e9;         /* 标准边框 */
  --yuanli-border-3: #d1d5da;         /* 强调边框 */
  --yuanli-border-strong: #959da5;    /* 强边框 */

  /* ===== 字体（中文优先，运营场景可读性）===== */
  --yuanli-font-sans: "PingFang SC", "Microsoft YaHei", "Roboto", "Helvetica Neue", Arial, sans-serif;
  --yuanli-font-mono: "SFMono-Regular", "SF Mono", "Roboto Mono", "Consolas", monospace;
  --yuanli-font-display: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;

  /* ===== 字号尺度（密集工作台）===== */
  --yuanli-font-size-display: 24px;
  --yuanli-font-size-h1: 20px;
  --yuanli-font-size-h2: 18px;
  --yuanli-font-size-h3: 16px;
  --yuanli-font-size-h4: 14px;
  --yuanli-font-size-body: 13px;
  --yuanli-font-size-small: 12px;
  --yuanli-font-size-caption: 11px;
  --yuanli-font-size-eyebrow: 11px;

  /* ===== 字重 ===== */
  --yuanli-font-weight-regular: 400;
  --yuanli-font-weight-medium: 500;
  --yuanli-font-weight-semibold: 600;

  /* ===== 行高 ===== */
  --yuanli-line-height-tight: 1.2;
  --yuanli-line-height-normal: 1.5;
  --yuanli-line-height-loose: 1.8;

  /* ===== 圆角 ===== */
  --yuanli-radius-sm: 4px;
  --yuanli-radius-md: 8px;
  --yuanli-radius-lg: 12px;
  --yuanli-radius-xl: 16px;
  --yuanli-radius-full: 9999px;

  /* ===== 间距（4px 基准）===== */
  --yuanli-spacing: 4px;
  --yuanli-space-1: 4px;
  --yuanli-space-2: 8px;
  --yuanli-space-3: 12px;
  --yuanli-space-4: 16px;
  --yuanli-space-5: 20px;
  --yuanli-space-6: 24px;
  --yuanli-space-8: 32px;
  --yuanli-space-10: 40px;
  --yuanli-space-12: 48px;

  /* ===== 阴影（源力 5 级，带层次感）===== */
  --yuanli-shadow-sm: 0 1px 2px 0 rgba(12, 13, 14, 0.05), 0 1px 1px 0 rgba(12, 13, 14, 0.03);
  --yuanli-shadow-md: 0 4px 8px -2px rgba(12, 13, 14, 0.07), 0 2px 4px -1px rgba(12, 13, 14, 0.04);
  --yuanli-shadow-lg: 0 12px 20px -6px rgba(12, 13, 14, 0.08), 0 4px 8px -2px rgba(12, 13, 14, 0.04);
  --yuanli-shadow-xl: 0 24px 40px -10px rgba(12, 13, 14, 0.10), 0 8px 16px -4px rgba(12, 13, 14, 0.06);
  --yuanli-shadow-blue: 0 0 0 1px #1664ff, 0 2px 1px 0 rgba(0, 0, 0, 0.15);

  /* ===== 尺度 ===== */
  --yuanli-nav-height: 56px;
  --yuanli-sidebar-width: 240px;
  --yuanli-max-content: 1440px;

  /* ===== 过渡 ===== */
  --yuanli-transition: 150ms ease;
}
