<!-- ============================================================
     退运智录 · 共享应用外壳片段（project-shell）
     源力（Volcengine）设计系统 · brand prefix: yuanli
     左侧 240px 侧边栏 + 顶栏 + 主内容区（PAGE_CONTENT_SLOT 占位）
     叶子页继承此骨架后填充 screen-shell 内容
     ============================================================ -->

<style>
/* ============================================================
   §1 基础重置与排版
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; }

.app-shell,
.app-shell * {
  font-family: var(--yuanli-font-sans);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.app-shell {
  font-size: var(--yuanli-font-size-body);
  line-height: var(--yuanli-line-height-normal);
  color: var(--yuanli-foreground);
  background: var(--yuanli-background);
}

.app-shell .mono,
.app-shell .font-mono {
  font-family: var(--yuanli-font-mono);
  font-variant-numeric: tabular-nums;
}

/* ============================================================
   §2 App-Shell Grid 布局
   侧栏 240px 固定 + 主内容区 1fr 滚动
   ============================================================ */
.app-shell {
  display: grid;
  grid-template-columns: var(--yuanli-sidebar-width) 1fr;
  grid-template-rows: 100vh;
  min-height: 100vh;
  overflow: hidden;
}

.app-shell .sidebar {
  grid-column: 1;
  grid-row: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
  background: var(--yuanli-sidebar);
  border-right: 1px solid var(--yuanli-sidebar-border);
}

.app-shell .content {
  grid-column: 2;
  grid-row: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  min-height: 0;
  overflow: hidden;
  background: var(--yuanli-background);
}

/* ============================================================
   §3 侧边栏 - 工作区切换器
   ============================================================ */
.app-shell .workspace {
  display: flex;
  align-items: center;
  height: var(--yuanli-nav-height);
  border-bottom: 1px solid var(--yuanli-sidebar-border);
  flex-shrink: 0;
  padding: 0 calc(var(--yuanli-spacing) * 3);
}

.app-shell .workspace-trigger {
  display: flex;
  align-items: center;
  gap: calc(var(--yuanli-spacing) * 3);
  width: 100%;
  padding: calc(var(--yuanli-spacing) * 2) calc(var(--yuanli-spacing) * 2);
  border-radius: var(--yuanli-radius-md);
  border: 1px solid transparent;
  background: transparent;
  cursor: pointer;
  transition: background var(--yuanli-transition), border-color var(--yuanli-transition);
}

.app-shell .workspace-trigger:hover {
  background: var(--yuanli-sidebar-accent);
  border-color: var(--yuanli-sidebar-border);
}

.app-shell .workspace-logo {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  border-radius: var(--yuanli-radius-md);
  background: var(--yuanli-primary);
  color: var(--yuanli-primary-foreground);
  font-size: var(--yuanli-font-size-small);
  font-weight: var(--yuanli-font-weight-semibold);
  letter-spacing: 0.02em;
  flex-shrink: 0;
}

.app-shell .workspace-info {
  display: flex;
  flex-direction: column;
  min-width: 0;
  flex: 1;
}

.app-shell .workspace-name {
  font-size: var(--yuanli-font-size-h4);
  font-weight: var(--yuanli-font-weight-semibold);
  color: var(--yuanli-sidebar-foreground);
  line-height: 1.2;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.app-shell .workspace-desc {
  font-size: var(--yuanli-font-size-caption);
  color: var(--yuanli-muted-foreground);
  line-height: 1.4;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: calc(var(--yuanli-spacing) * 0.5);
}

.app-shell .workspace-chevron {
  color: var(--yuanli-muted-foreground);
  flex-shrink: 0;
}

/* ============================================================
   §4 侧边栏 - 导航列表
   ============================================================ */
.app-shell .nav-list {
  display: flex;
  flex-direction: column;
  gap: calc(var(--yuanli-spacing) * 1);
  padding: calc(var(--yuanli-spacing) * 3);
  flex: 1;
  min-height: 0;
  overflow-y: auto;
}

.app-shell .nav-list::-webkit-scrollbar { width: 6px; }
.app-shell .nav-list::-webkit-scrollbar-thumb {
  background: var(--yuanli-border);
  border-radius: var(--yuanli-radius-full);
}
.app-shell .nav-list::-webkit-scrollbar-track { background: transparent; }

.app-shell .nav-section-label {
  font-size: var(--yuanli-font-size-caption);
  font-weight: var(--yuanli-font-weight-medium);
  color: var(--yuanli-muted-foreground);
  letter-spacing: 0.04em;
  padding: calc(var(--yuanli-spacing) * 2) calc(var(--yuanli-spacing) * 3) calc(var(--yuanli-spacing) * 1);
  text-transform: uppercase;
}

.app-shell .nav-item {
  position: relative;
  display: flex;
  align-items: center;
  gap: calc(var(--yuanli-spacing) * 3);
  height: 36px;
  padding: 0 calc(var(--yuanli-spacing) * 3);
  border-radius: var(--yuanli-radius-md);
  color: var(--yuanli-color-text-2);
  font-size: var(--yuanli-font-size-body);
  font-weight: var(--yuanli-font-weight-regular);
  text-decoration: none;
  cursor: pointer;
  transition: background var(--yuanli-transition), color var(--yuanli-transition);
  flex-shrink: 0;
}

.app-shell .nav-item:hover {
  background: var(--yuanli-sidebar-accent);
  color: var(--yuanli-sidebar-foreground);
}

.app-shell .nav-item:focus-visible {
  outline: 2px solid var(--yuanli-ring);
  outline-offset: -2px;
}

.app-shell .nav-item .nav-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 18px;
  height: 18px;
  flex-shrink: 0;
  color: currentColor;
}

.app-shell .nav-item .nav-label {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
  min-width: 0;
}

.app-shell .nav-item .nav-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 18px;
  height: 18px;
  padding: 0 calc(var(--yuanli-spacing) * 1.5);
  border-radius: var(--yuanli-radius-full);
  background: var(--yuanli-danger-subtle);
  color: var(--yuanli-danger-strong);
  font-size: var(--yuanli-font-size-caption);
  font-weight: var(--yuanli-font-weight-semibold);
  line-height: 1;
  flex-shrink: 0;
}

/* 激活态：sidebar-accent 底 + 品牌蓝 3px 左指示条 + 品牌蓝文字 */
.app-shell .nav-item.active {
  background: var(--yuanli-sidebar-accent);
  color: var(--yuanli-primary);
  font-weight: var(--yuanli-font-weight-semibold);
}

.app-shell .nav-item.active::before {
  content: "";
  position: absolute;
  left: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 3px;
  height: 20px;
  border-radius: 0 var(--yuanli-radius-sm) var(--yuanli-radius-sm) 0;
  background: var(--yuanli-primary);
}

.app-shell .nav-item.active .nav-badge {
  background: var(--yuanli-primary);
  color: var(--yuanli-primary-foreground);
}

/* ============================================================
   §5 侧边栏 - 底部用户信息卡片
   ============================================================ */
.app-shell .nav-meta {
  flex-shrink: 0;
  padding: calc(var(--yuanli-spacing) * 3);
  border-top: 1px solid var(--yuanli-sidebar-border);
}

.app-shell .user-pill {
  display: flex;
  align-items: center;
  gap: calc(var(--yuanli-spacing) * 3);
  width: 100%;
  padding: calc(var(--yuanli-spacing) * 2);
  border-radius: var(--yuanli-radius-md);
  border: 1px solid transparent;
  background: transparent;
  cursor: pointer;
  transition: background var(--yuanli-transition), border-color var(--yuanli-transition);
}

.app-shell .user-pill:hover {
  background: var(--yuanli-sidebar-accent);
  border-color: var(--yuanli-sidebar-border);
}

.app-shell .user-pill .user-avatar {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  border-radius: var(--yuanli-radius-full);
  background: var(--yuanli-accent);
  color: var(--yuanli-accent-foreground);
  font-size: var(--yuanli-font-size-small);
  font-weight: var(--yuanli-font-weight-semibold);
  flex-shrink: 0;
}

.app-shell .user-pill .user-info {
  display: flex;
  flex-direction: column;
  min-width: 0;
  flex: 1;
  text-align: left;
}

.app-shell .user-pill .user-name {
  font-size: var(--yuanli-font-size-body);
  font-weight: var(--yuanli-font-weight-medium);
  color: var(--yuanli-sidebar-foreground);
  line-height: 1.3;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.app-shell .user-pill .user-role {
  font-size: var(--yuanli-font-size-caption);
  color: var(--yuanli-muted-foreground);
  line-height: 1.4;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: calc(var(--yuanli-spacing) * 0.5);
}

.app-shell .user-pill .user-chevron {
  color: var(--yuanli-muted-foreground);
  flex-shrink: 0;
}

/* ============================================================
   §6 顶栏 Topbar
   ============================================================ */
.app-shell .topbar {
  display: flex;
  align-items: center;
  gap: calc(var(--yuanli-spacing) * 4);
  height: var(--yuanli-nav-height);
  padding: 0 calc(var(--yuanli-spacing) * 6);
  background: var(--yuanli-background);
  border-bottom: 1px solid var(--yuanli-border);
  flex-shrink: 0;
}

.app-shell .topbar-left {
  display: flex;
  align-items: center;
  gap: calc(var(--yuanli-spacing) * 4);
  min-width: 0;
  flex: 1;
}

.app-shell .page-title {
  font-size: var(--yuanli-font-size-h1);
  font-weight: var(--yuanli-font-weight-semibold);
  color: var(--yuanli-foreground);
  line-height: 1.2;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex-shrink: 0;
}

/* ============================================================
   §7 搜索框
   ============================================================ */
.app-shell .search {
  position: relative;
  display: flex;
  align-items: center;
  flex: 1;
  max-width: 420px;
  min-width: 0;
}

.app-shell .search .search-icon {
  position: absolute;
  left: calc(var(--yuanli-spacing) * 3);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: var(--yuanli-muted-foreground);
  pointer-events: none;
}

.app-shell .search .search-input {
  width: 100%;
  height: 34px;
  padding: 0 calc(var(--yuanli-spacing) * 3) 0 calc(var(--yuanli-spacing) * 9);
  border: 1px solid var(--yuanli-input);
  border-radius: var(--yuanli-radius-md);
  background: var(--yuanli-background);
  color: var(--yuanli-foreground);
  font-size: var(--yuanli-font-size-body);
  font-family: var(--yuanli-font-sans);
  transition: border-color var(--yuanli-transition), box-shadow var(--yuanli-transition);
}

.app-shell .search .search-input::placeholder {
  color: var(--yuanli-muted-foreground);
}

.app-shell .search .search-input:hover {
  border-color: var(--yuanli-border-3, var(--yuanli-border));
}

.app-shell .search .search-input:focus {
  outline: none;
  border-color: var(--yuanli-primary);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--yuanli-ring) 20%, transparent);
}

.app-shell .search .search-kbd {
  position: absolute;
  right: calc(var(--yuanli-spacing) * 2);
  display: inline-flex;
  align-items: center;
  height: 20px;
  padding: 0 calc(var(--yuanli-spacing) * 1.5);
  border: 1px solid var(--yuanli-border);
  border-radius: var(--yuanli-radius-sm);
  background: var(--yuanli-muted);
  color: var(--yuanli-muted-foreground);
  font-size: var(--yuanli-font-size-caption);
  font-family: var(--yuanli-font-mono);
  pointer-events: none;
}

/* ============================================================
   §8 顶栏工具区 + 图标按钮
   ============================================================ */
.app-shell .toolbar {
  display: flex;
  align-items: center;
  gap: calc(var(--yuanli-spacing) * 2);
  flex-shrink: 0;
}

.app-shell .icon-btn {
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 34px;
  height: 34px;
  border: 1px solid transparent;
  border-radius: var(--yuanli-radius-md);
  background: transparent;
  color: var(--yuanli-color-text-2);
  cursor: pointer;
  transition: background var(--yuanli-transition), color var(--yuanli-transition), border-color var(--yuanli-transition);
  flex-shrink: 0;
}

.app-shell .icon-btn:hover {
  background: var(--yuanli-muted);
  color: var(--yuanli-foreground);
}

.app-shell .icon-btn:focus-visible {
  outline: 2px solid var(--yuanli-ring);
  outline-offset: -2px;
}

.app-shell .icon-btn .icon-dot {
  position: absolute;
  top: calc(var(--yuanli-spacing) * 2);
  right: calc(var(--yuanli-spacing) * 2);
  width: 7px;
  height: 7px;
  border-radius: var(--yuanli-radius-full);
  background: var(--yuanli-danger);
  border: 1.5px solid var(--yuanli-background);
}

/* ============================================================
   §9 顶栏用户芯片
   ============================================================ */
.app-shell .user-chip {
  display: inline-flex;
  align-items: center;
  gap: calc(var(--yuanli-spacing) * 2);
  height: 34px;
  padding: 0 calc(var(--yuanli-spacing) * 2) 0 calc(var(--yuanli-spacing) * 1);
  border: 1px solid var(--yuanli-border);
  border-radius: var(--yuanli-radius-full);
  background: var(--yuanli-background);
  color: var(--yuanli-foreground);
  cursor: pointer;
  transition: background var(--yuanli-transition), border-color var(--yuanli-transition);
  flex-shrink: 0;
}

.app-shell .user-chip:hover {
  background: var(--yuanli-muted);
  border-color: var(--yuanli-border-3, var(--yuanli-border));
}

.app-shell .user-chip:focus-visible {
  outline: 2px solid var(--yuanli-ring);
  outline-offset: -2px;
}

.app-shell .user-chip .chip-avatar {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 26px;
  height: 26px;
  border-radius: var(--yuanli-radius-full);
  background: var(--yuanli-primary);
  color: var(--yuanli-primary-foreground);
  font-size: var(--yuanli-font-size-caption);
  font-weight: var(--yuanli-font-weight-semibold);
  flex-shrink: 0;
}

.app-shell .user-chip .chip-name {
  font-size: var(--yuanli-font-size-body);
  font-weight: var(--yuanli-font-weight-medium);
  color: var(--yuanli-foreground);
  white-space: nowrap;
}

/* ============================================================
   §10 按钮全族（Primary / Secondary / Ghost / Danger / Large）
   ============================================================ */
.app-shell .btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: calc(var(--yuanli-spacing) * 2);
  height: 34px;
  padding: 0 calc(var(--yuanli-spacing) * 4);
  border: 1px solid transparent;
  border-radius: var(--yuanli-radius-md);
  font-size: var(--yuanli-font-size-body);
  font-weight: var(--yuanli-font-weight-medium);
  font-family: var(--yuanli-font-sans);
  line-height: 1;
  white-space: nowrap;
  cursor: pointer;
  text-decoration: none;
  transition: background var(--yuanli-transition), color var(--yuanli-transition), border-color var(--yuanli-transition), box-shadow var(--yuanli-transition), transform var(--yuanli-transition);
  flex-shrink: 0;
}

.app-shell .btn:focus-visible {
  outline: 2px solid var(--yuanli-ring);
  outline-offset: 2px;
}

.app-shell .btn:disabled,
.app-shell .btn[aria-disabled="true"] {
  opacity: 0.5;
  cursor: not-allowed;
  pointer-events: none;
}

/* Primary：品牌蓝底白字 */
.app-shell .btn-primary {
  background: var(--yuanli-primary);
  color: var(--yuanli-primary-foreground);
  border-color: var(--yuanli-primary);
}

.app-shell .btn-primary:hover {
  background: var(--yuanli-ring);
  border-color: var(--yuanli-ring);
}

.app-shell .btn-primary:active {
  transform: translateY(0.5px);
}

/* Secondary：白底 + 边框 */
.app-shell .btn-secondary {
  background: var(--yuanli-background);
  color: var(--yuanli-foreground);
  border-color: var(--yuanli-border);
}

.app-shell .btn-secondary:hover {
  background: var(--yuanli-muted);
  border-color: var(--yuanli-border-3, var(--yuanli-border));
}

/* Ghost：透明无边框 */
.app-shell .btn-ghost {
  background: transparent;
  color: var(--yuanli-color-text-2);
  border-color: transparent;
}

.app-shell .btn-ghost:hover {
  background: var(--yuanli-muted);
  color: var(--yuanli-foreground);
}

/* Danger：红底 */
.app-shell .btn-danger {
  background: var(--yuanli-danger);
  color: var(--yuanli-primary-foreground);
  border-color: var(--yuanli-danger);
}

.app-shell .btn-danger:hover {
  background: var(--yuanli-danger-strong);
  border-color: var(--yuanli-danger-strong);
}

/* Large 高度 40px */
.app-shell .btn-lg {
  height: 40px;
  padding: 0 calc(var(--yuanli-spacing) * 5);
  font-size: var(--yuanli-font-size-h4);
}

/* 按钮内图标尺寸 */
.app-shell .btn .btn-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 16px;
  height: 16px;
  flex-shrink: 0;
}

/* ============================================================
   §11 卡片 Card
   ============================================================ */
.app-shell .card {
  background: var(--yuanli-card);
  border: 1px solid var(--yuanli-border);
  border-radius: var(--yuanli-radius-lg);
  padding: calc(var(--yuanli-spacing) * 5);
  box-shadow: var(--yuanli-shadow-md);
  transition: box-shadow var(--yuanli-transition), border-color var(--yuanli-transition);
}

.app-shell .card-interactive {
  cursor: pointer;
}

.app-shell .card-interactive:hover {
  box-shadow: var(--yuanli-shadow-lg);
  border-color: var(--yuanli-border-3, var(--yuanli-border));
}

/* 卡片头部 */
.app-shell .card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: calc(var(--yuanli-spacing) * 4);
  margin-bottom: calc(var(--yuanli-spacing) * 4);
}

.app-shell .card-header .card-title-group {
  display: flex;
  flex-direction: column;
  gap: calc(var(--yuanli-spacing) * 1);
  min-width: 0;
  flex: 1;
}

.app-shell .card-header .card-title {
  font-size: var(--yuanli-font-size-h3);
  font-weight: var(--yuanli-font-weight-semibold);
  color: var(--yuanli-foreground);
  line-height: 1.3;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.app-shell .card-header .card-subtitle {
  font-size: var(--yuanli-font-size-small);
  color: var(--yuanli-muted-foreground);
  line-height: 1.4;
}

.app-shell .card-header .card-actions {
  display: flex;
  align-items: center;
  gap: calc(var(--yuanli-spacing) * 2);
  flex-shrink: 0;
}

.app-shell .card-body {
  display: flex;
  flex-direction: column;
  gap: calc(var(--yuanli-spacing) * 4);
}

.app-shell .card-footer {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: calc(var(--yuanli-spacing) * 2);
  margin-top: calc(var(--yuanli-spacing) * 5);
  padding-top: calc(var(--yuanli-spacing) * 4);
  border-top: 1px solid var(--yuanli-border);
}

/* ============================================================
   §12 指标网格 Metrics Grid（KPI 卡片）
   ============================================================ */
.app-shell .metrics-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: calc(var(--yuanli-spacing) * 4);
}

.app-shell .metric-card {
  display: flex;
  flex-direction: column;
  gap: calc(var(--yuanli-spacing) * 2);
  padding: calc(var(--yuanli-spacing) * 4) calc(var(--yuanli-spacing) * 5);
  background: var(--yuanli-card);
  border: 1px solid var(--yuanli-border);
  border-radius: var(--yuanli-radius-lg);
  min-width: 0;
}

.app-shell .metric-card .metric-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: calc(var(--yuanli-spacing) * 2);
}

.app-shell .metric-card .metric-label {
  font-size: var(--yuanli-font-size-small);
  color: var(--yuanli-muted-foreground);
  font-weight: var(--yuanli-font-weight-medium);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.app-shell .metric-card .metric-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  border-radius: var(--yuanli-radius-md);
  background: var(--yuanli-accent);
  color: var(--yuanli-primary);
  flex-shrink: 0;
}

.app-shell .metric-card .metric-value {
  font-size: var(--yuanli-font-size-display);
  font-weight: var(--yuanli-font-weight-semibold);
  color: var(--yuanli-foreground);
  line-height: 1.1;
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}

.app-shell .metric-card .metric-delta {
  display: inline-flex;
  align-items: center;
  gap: calc(var(--yuanli-spacing) * 1);
  font-size: var(--yuanli-font-size-caption);
  font-weight: var(--yuanli-font-weight-medium);
  font-variant-numeric: tabular-nums;
}

.app-shell .metric-card .metric-delta.up { color: var(--yuanli-success); }
.app-shell .metric-card .metric-delta.down { color: var(--yuanli-danger); }
.app-shell .metric-card .metric-delta.flat { color: var(--yuanli-muted-foreground); }

.app-shell .metric-card .metric-foot {
  font-size: var(--yuanli-font-size-caption);
  color: var(--yuanli-muted-foreground);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ============================================================
   §13 数据表格 Data Table
   ============================================================ */
.app-shell .data-table-wrap {
  border: 1px solid var(--yuanli-border);
  border-radius: var(--yuanli-radius-lg);
  background: var(--yuanli-card);
  overflow: hidden;
}

.app-shell .data-table-scroll {
  overflow-x: auto;
}

.app-shell .data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: var(--yuanli-font-size-body);
}

.app-shell .data-table thead th {
  background: var(--yuanli-muted);
  color: var(--yuanli-color-text-2);
  font-size: var(--yuanli-font-size-small);
  font-weight: var(--yuanli-font-weight-medium);
  text-align: left;
  padding: calc(var(--yuanli-spacing) * 3) calc(var(--yuanli-spacing) * 4);
  border-bottom: 1px solid var(--yuanli-border);
  white-space: nowrap;
}

.app-shell .data-table tbody td {
  padding: calc(var(--yuanli-spacing) * 3) calc(var(--yuanli-spacing) * 4);
  border-bottom: 1px solid var(--yuanli-border);
  color: var(--yuanli-foreground);
  vertical-align: middle;
}

.app-shell .data-table tbody tr:last-child td {
  border-bottom: none;
}

.app-shell .data-table tbody tr {
  transition: background var(--yuanli-transition);
}

.app-shell .data-table tbody tr:hover {
  background: var(--yuanli-muted);
}

.app-shell .data-table .cell-id,
.app-shell .data-table .cell-mono {
  font-family: var(--yuanli-font-mono);
  font-variant-numeric: tabular-nums;
  font-size: var(--yuanli-font-size-small);
  color: var(--yuanli-color-text-2);
  white-space: nowrap;
}

.app-shell .data-table .cell-primary {
  font-weight: var(--yuanli-font-weight-medium);
  color: var(--yuanli-foreground);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 220px;
}

.app-shell .data-table .cell-secondary {
  color: var(--yuanli-color-text-2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 180px;
}

.app-shell .data-table .cell-actions {
  display: inline-flex;
  align-items: center;
  gap: calc(var(--yuanli-spacing) * 1);
  white-space: nowrap;
}

/* ============================================================
   §14 表格状态徽章 Table Pill 全族
   ============================================================ */
.app-shell .table-pill {
  display: inline-flex;
  align-items: center;
  gap: calc(var(--yuanli-spacing) * 1.5);
  height: 22px;
  padding: 0 calc(var(--yuanli-spacing) * 2);
  border-radius: var(--yuanli-radius-full);
  font-size: var(--yuanli-font-size-caption);
  font-weight: var(--yuanli-font-weight-medium);
  line-height: 1;
  white-space: nowrap;
}

.app-shell .table-pill .pill-dot {
  width: 6px;
  height: 6px;
  border-radius: var(--yuanli-radius-full);
  background: currentColor;
  flex-shrink: 0;
}

.app-shell .pill-success {
  background: var(--yuanli-success-subtle);
  color: var(--yuanli-success-strong);
}

.app-shell .pill-warning {
  background: var(--yuanli-warning-subtle);
  color: var(--yuanli-warning-strong);
}

.app-shell .pill-danger {
  background: var(--yuanli-danger-subtle);
  color: var(--yuanli-danger-strong);
}

.app-shell .pill-info {
  background: var(--yuanli-accent);
  color: var(--yuanli-accent-foreground);
}

.app-shell .pill-neutral {
  background: var(--yuanli-muted);
  color: var(--yuanli-color-text-2);
}

/* ============================================================
   §15 标签 Tag
   ============================================================ */
.app-shell .tag {
  display: inline-flex;
  align-items: center;
  gap: calc(var(--yuanli-spacing) * 1);
  height: 22px;
  padding: 0 calc(var(--yuanli-spacing) * 2);
  border: 1px solid var(--yuanli-border);
  border-radius: var(--yuanli-radius-sm);
  background: var(--yuanli-muted);
  color: var(--yuanli-color-text-2);
  font-size: var(--yuanli-font-size-caption);
  font-weight: var(--yuanli-font-weight-medium);
  line-height: 1;
  white-space: nowrap;
}

.app-shell .tag-solid {
  background: var(--yuanli-accent);
  color: var(--yuanli-accent-foreground);
  border-color: transparent;
}

.app-shell .tag-primary {
  background: var(--yuanli-primary);
  color: var(--yuanli-primary-foreground);
  border-color: var(--yuanli-primary);
}

/* ============================================================
   §16 徽章 Badge（计数/标记）
   ============================================================ */
.app-shell .badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 18px;
  height: 18px;
  padding: 0 calc(var(--yuanli-spacing) * 1.5);
  border-radius: var(--yuanli-radius-full);
  background: var(--yuanli-primary);
  color: var(--yuanli-primary-foreground);
  font-size: var(--yuanli-font-size-caption);
  font-weight: var(--yuanli-font-weight-semibold);
  line-height: 1;
  white-space: nowrap;
}

.app-shell .badge-danger {
  background: var(--yuanli-danger);
  color: var(--yuanli-primary-foreground);
}

.app-shell .badge-warning {
  background: var(--yuanli-warning);
  color: var(--yuanli-primary-foreground);
}

.app-shell .badge-neutral {
  background: var(--yuanli-muted);
  color: var(--yuanli-color-text-2);
}

/* ============================================================
   §17 状态色徽章（success/warning/danger 三态，浅底 + 强色文字）
   ============================================================ */
.app-shell .status-badge {
  display: inline-flex;
  align-items: center;
  gap: calc(var(--yuanli-spacing) * 1.5);
  height: 24px;
  padding: 0 calc(var(--yuanli-spacing) * 2.5);
  border-radius: var(--yuanli-radius-full);
  font-size: var(--yuanli-font-size-small);
  font-weight: var(--yuanli-font-weight-medium);
  line-height: 1;
  white-space: nowrap;
}

.app-shell .status-badge .status-dot {
  width: 6px;
  height: 6px;
  border-radius: var(--yuanli-radius-full);
  background: currentColor;
  flex-shrink: 0;
}

.app-shell .status-success {
  background: var(--yuanli-success-subtle);
  color: var(--yuanli-success-strong);
}

.app-shell .status-warning {
  background: var(--yuanli-warning-subtle);
  color: var(--yuanli-warning-strong);
}

.app-shell .status-danger {
  background: var(--yuanli-danger-subtle);
  color: var(--yuanli-danger-strong);
}

/* ============================================================
   §18 列表 List
   ============================================================ */
.app-shell .list {
  display: flex;
  flex-direction: column;
  gap: 0;
  border: 1px solid var(--yuanli-border);
  border-radius: var(--yuanli-radius-lg);
  background: var(--yuanli-card);
  overflow: hidden;
}

.app-shell .list-item {
  display: flex;
  align-items: center;
  gap: calc(var(--yuanli-spacing) * 3);
  padding: calc(var(--yuanli-spacing) * 3) calc(var(--yuanli-spacing) * 4);
  border-bottom: 1px solid var(--yuanli-border);
  transition: background var(--yuanli-transition);
  min-height: 48px;
}

.app-shell .list-item:last-child {
  border-bottom: none;
}

.app-shell .list-item:hover {
  background: var(--yuanli-muted);
}

.app-shell .list-item .list-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  border-radius: var(--yuanli-radius-md);
  background: var(--yuanli-accent);
  color: var(--yuanli-primary);
  flex-shrink: 0;
}

.app-shell .list-item .list-content {
  display: flex;
  flex-direction: column;
  gap: calc(var(--yuanli-spacing) * 0.5);
  min-width: 0;
  flex: 1;
}

.app-shell .list-item .list-title {
  font-size: var(--yuanli-font-size-body);
  font-weight: var(--yuanli-font-weight-medium);
  color: var(--yuanli-foreground);
  line-height: 1.3;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.app-shell .list-item .list-subtitle {
  font-size: var(--yuanli-font-size-caption);
  color: var(--yuanli-muted-foreground);
  line-height: 1.4;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.app-shell .list-item .list-meta {
  font-size: var(--yuanli-font-size-caption);
  color: var(--yuanli-muted-foreground);
  font-family: var(--yuanli-font-mono);
  font-variant-numeric: tabular-nums;
  flex-shrink: 0;
  white-space: nowrap;
}

.app-shell .list-item .list-action {
  display: inline-flex;
  align-items: center;
  color: var(--yuanli-muted-foreground);
  flex-shrink: 0;
}

/* ============================================================
   §19 表单输入 Form Input
   ============================================================ */
.app-shell .form-field {
  display: flex;
  flex-direction: column;
  gap: calc(var(--yuanli-spacing) * 2);
}

.app-shell .form-label {
  font-size: var(--yuanli-font-size-small);
  font-weight: var(--yuanli-font-weight-medium);
  color: var(--yuanli-color-text-2);
  line-height: 1.3;
}

.app-shell .form-label .form-required {
  color: var(--yuanli-danger);
  margin-left: calc(var(--yuanli-spacing) * 0.5);
}

.app-shell .form-input,
.app-shell .form-select,
.app-shell .form-textarea {
  width: 100%;
  height: 34px;
  padding: 0 calc(var(--yuanli-spacing) * 3);
  border: 1px solid var(--yuanli-input);
  border-radius: var(--yuanli-radius-md);
  background: var(--yuanli-background);
  color: var(--yuanli-foreground);
  font-size: var(--yuanli-font-size-body);
  font-family: var(--yuanli-font-sans);
  transition: border-color var(--yuanli-transition), box-shadow var(--yuanli-transition);
}

.app-shell .form-textarea {
  height: auto;
  min-height: 80px;
  padding: calc(var(--yuanli-spacing) * 2.5) calc(var(--yuanli-spacing) * 3);
  line-height: 1.5;
  resize: vertical;
}

.app-shell .form-input::placeholder,
.app-shell .form-textarea::placeholder {
  color: var(--yuanli-color-text-4, var(--yuanli-muted-foreground));
}

.app-shell .form-input:hover,
.app-shell .form-select:hover,
.app-shell .form-textarea:hover {
  border-color: var(--yuanli-border-3, var(--yuanli-border));
}

.app-shell .form-input:focus,
.app-shell .form-select:focus,
.app-shell .form-textarea:focus {
  outline: none;
  border-color: var(--yuanli-primary);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--yuanli-ring) 20%, transparent);
}

.app-shell .form-input:disabled,
.app-shell .form-select:disabled,
.app-shell .form-textarea:disabled {
  background: var(--yuanli-muted);
  color: var(--yuanli-muted-foreground);
  cursor: not-allowed;
}

.app-shell .form-input.is-error,
.app-shell .form-textarea.is-error {
  border-color: var(--yuanli-danger);
}

.app-shell .form-input.is-error:focus,
.app-shell .form-textarea.is-error:focus {
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--yuanli-danger) 20%, transparent);
}

.app-shell .form-help {
  font-size: var(--yuanli-font-size-caption);
  color: var(--yuanli-muted-foreground);
  line-height: 1.4;
}

.app-shell .form-error {
  font-size: var(--yuanli-font-size-caption);
  color: var(--yuanli-danger);
  line-height: 1.4;
}

.app-shell .form-input-lg {
  height: 40px;
  font-size: var(--yuanli-font-size-h4);
}

/* ============================================================
   §20 开关 Toggle
   ============================================================ */
.app-shell .toggle {
  position: relative;
  display: inline-flex;
  align-items: center;
  width: 36px;
  height: 20px;
  border-radius: var(--yuanli-radius-full);
  background: var(--yuanli-border);
  border: none;
  cursor: pointer;
  padding: 0;
  flex-shrink: 0;
  transition: background var(--yuanli-transition);
}

.app-shell .toggle::after {
  content: "";
  position: absolute;
  top: 2px;
  left: 2px;
  width: 16px;
  height: 16px;
  border-radius: var(--yuanli-radius-full);
  background: var(--yuanli-background);
  box-shadow: var(--yuanli-shadow-sm);
  transition: transform var(--yuanli-transition);
}

.app-shell .toggle[aria-checked="true"],
.app-shell .toggle.is-on {
  background: var(--yuanli-primary);
}

.app-shell .toggle[aria-checked="true"]::after,
.app-shell .toggle.is-on::after {
  transform: translateX(16px);
}

.app-shell .toggle:focus-visible {
  outline: 2px solid var(--yuanli-ring);
  outline-offset: 2px;
}

.app-shell .toggle:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* ============================================================
   §21 图表容器 Chart
   ============================================================ */
.app-shell .chart-container {
  position: relative;
  width: 100%;
  min-height: 240px;
  padding: calc(var(--yuanli-spacing) * 5);
  border: 1px solid var(--yuanli-border);
  border-radius: var(--yuanli-radius-lg);
  background: var(--yuanli-card);
}

.app-shell .chart-canvas-wrap {
  position: relative;
  width: 100%;
  height: 240px;
}

.app-shell .chart-legend {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: calc(var(--yuanli-spacing) * 4);
  margin-top: calc(var(--yuanli-spacing) * 3);
}

.app-shell .chart-legend-item {
  display: inline-flex;
  align-items: center;
  gap: calc(var(--yuanli-spacing) * 1.5);
  font-size: var(--yuanli-font-size-small);
  color: var(--yuanli-color-text-2);
}

.app-shell .chart-legend-dot {
  width: 8px;
  height: 8px;
  border-radius: var(--yuanli-radius-sm);
  flex-shrink: 0;
}

.app-shell .chart-legend-dot.c1 { background: var(--yuanli-chart-1); }
.app-shell .chart-legend-dot.c2 { background: var(--yuanli-chart-2); }
.app-shell .chart-legend-dot.c3 { background: var(--yuanli-chart-3); }
.app-shell .chart-legend-dot.c4 { background: var(--yuanli-chart-4); }
.app-shell .chart-legend-dot.c5 { background: var(--yuanli-chart-5); }

/* ============================================================
   §22 分页 Pagination
   ============================================================ */
.app-shell .pagination {
  display: flex;
  align-items: center;
  gap: calc(var(--yuanli-spacing) * 1);
  flex-wrap: nowrap;
}

.app-shell .pagination .page-item {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 32px;
  height: 32px;
  padding: 0 calc(var(--yuanli-spacing) * 2);
  border: 1px solid var(--yuanli-border);
  border-radius: var(--yuanli-radius-md);
  background: var(--yuanli-background);
  color: var(--yuanli-color-text-2);
  font-size: var(--yuanli-font-size-small);
  font-weight: var(--yuanli-font-weight-medium);
  cursor: pointer;
  white-space: nowrap;
  transition: background var(--yuanli-transition), color var(--yuanli-transition), border-color var(--yuanli-transition);
}

.app-shell .pagination .page-item:hover:not(:disabled):not(.active) {
  background: var(--yuanli-muted);
  color: var(--yuanli-foreground);
  border-color: var(--yuanli-border-3, var(--yuanli-border));
}

.app-shell .pagination .page-item.active {
  background: var(--yuanli-primary);
  color: var(--yuanli-primary-foreground);
  border-color: var(--yuanli-primary);
}

.app-shell .pagination .page-item:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.app-shell .pagination .page-item:focus-visible {
  outline: 2px solid var(--yuanli-ring);
  outline-offset: -2px;
}

.app-shell .pagination .page-info {
  font-size: var(--yuanli-font-size-small);
  color: var(--yuanli-muted-foreground);
  margin: 0 calc(var(--yuanli-spacing) * 2);
  white-space: nowrap;
}

.app-shell .pagination .page-jumper {
  display: inline-flex;
  align-items: center;
  gap: calc(var(--yuanli-spacing) * 2);
  margin-left: calc(var(--yuanli-spacing) * 4);
  font-size: var(--yuanli-font-size-small);
  color: var(--yuanli-muted-foreground);
}

.app-shell .pagination .page-jumper input {
  width: 52px;
  height: 32px;
  padding: 0 calc(var(--yuanli-spacing) * 2);
  border: 1px solid var(--yuanli-input);
  border-radius: var(--yuanli-radius-md);
  background: var(--yuanli-background);
  color: var(--yuanli-foreground);
  font-size: var(--yuanli-font-size-small);
  text-align: center;
}

.app-shell .pagination .page-jumper input:focus {
  outline: none;
  border-color: var(--yuanli-primary);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--yuanli-ring) 20%, transparent);
}

/* ============================================================
   §23 Focusable 焦点样式（通用）
   ============================================================ */
.app-shell .focusable:focus-visible,
.app-shell a:focus-visible,
.app-shell button:focus-visible,
.app-shell [tabindex]:focus-visible {
  outline: 2px solid var(--yuanli-ring);
  outline-offset: 2px;
  border-radius: var(--yuanli-radius-sm);
}

.app-shell .focus-ring-blue:focus-visible {
  outline: none;
  border-color: var(--yuanli-primary);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--yuanli-ring) 20%, transparent);
}

/* ============================================================
   §24 工具类 Utilities
   ============================================================ */
.app-shell .text-primary { color: var(--yuanli-primary); }
.app-shell .text-foreground { color: var(--yuanli-foreground); }
.app-shell .text-muted { color: var(--yuanli-muted-foreground); }
.app-shell .text-text-2 { color: var(--yuanli-color-text-2); }
.app-shell .text-text-3 { color: var(--yuanli-color-text-3); }
.app-shell .text-success { color: var(--yuanli-success); }
.app-shell .text-warning { color: var(--yuanli-warning); }
.app-shell .text-danger { color: var(--yuanli-danger); }

.app-shell .bg-card { background: var(--yuanli-card); }
.app-shell .bg-muted { background: var(--yuanli-muted); }
.app-shell .bg-accent { background: var(--yuanli-accent); }

.app-shell .divider {
  height: 1px;
  background: var(--yuanli-border);
  border: none;
  margin: 0;
}

.app-shell .divider-vertical {
  width: 1px;
  align-self: stretch;
  background: var(--yuanli-border);
  border: none;
  margin: 0;
}

/* ============================================================
   §25 动画 Animation
   ============================================================ */
@keyframes yuanli-fade-in {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes yuanli-pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

@keyframes yuanli-spin {
  to { transform: rotate(360deg); }
}

.app-shell .anim-fade-in {
  animation: yuanli-fade-in 240ms cubic-bezier(0.3, 0, 0, 1) both;
}

.app-shell .anim-pulse {
  animation: yuanli-pulse 1.6s cubic-bezier(0.4, 0, 0.6, 1) infinite;
}

.app-shell .anim-spin {
  animation: yuanli-spin 800ms linear infinite;
}

@media (prefers-reduced-motion: reduce) {
  .app-shell *,
  .app-shell *::before,
  .app-shell *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

/* ============================================================
   §26 Screen Shell（主内容滚动区）
   ============================================================ */
.app-shell .screen-shell {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding: calc(var(--yuanli-spacing) * 6);
  background: var(--yuanli-background);
}

.app-shell .screen-shell::-webkit-scrollbar { width: 8px; }
.app-shell .screen-shell::-webkit-scrollbar-thumb {
  background: var(--yuanli-border);
  border-radius: var(--yuanli-radius-full);
}
.app-shell .screen-shell::-webkit-scrollbar-thumb:hover {
  background: var(--yuanli-border-3, var(--yuanli-border));
}
.app-shell .screen-shell::-webkit-scrollbar-track { background: transparent; }

/* 内容块纵向节奏 */
.app-shell .screen-section {
  display: flex;
  flex-direction: column;
