# 退运智录后端配置
server:
  port: 8080

spring:
  # 步骤1骨架阶段：暂不连接数据库，步骤2实现数据库时移除以下排除配置
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - com.baomidou.mybatisplus.autoconfigure.MybatisPlusAutoConfiguration
  datasource:
    url: jdbc:mysql://localhost:3306/return_ocr?useSSL=false&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

# 智谱OCR（引擎A）
zhipu:
  api-key: ${ZHIPU_API_KEY}

# 阿里云OCR（引擎B）
aliyun:
  ocr:
    access-key-id: ${ALIYUN_AK_ID}
    access-key-secret: ${ALIYUN_AK_SECRET}

# 腾讯云COS
cos:
  secret-id: ${COS_SECRET_ID}
  secret-key: ${COS_SECRET_KEY}
  region: ${COS_REGION:ap-guangzhou}
  bucket: ${COS_BUCKET}

# DeepSeek LLM
deepseek:
  api-key: ${DEEPSEEK_API_KEY}
  base-url: https://api.deepseek.com
  model: deepseek-v4-flash

# 飞书
feishu:
  app-id: ${FEISHU_APP_ID}
  app-secret: ${FEISHU_APP_SECRET}
  app-token: ${FEISHU_APP_TOKEN}
  table-id: ${FEISHU_TABLE_ID}
  bot-webhook: ${FEISHU_BOT_WEBHOOK}

logging:
  level:
    root: INFO
