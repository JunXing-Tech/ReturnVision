# 退运智录后端配置
server:
  port: 8080
  # 信任 Nginx 反代转发过来的 X-Forwarded-Proto/Host/Port 头
  # 否则 Spring 拿到的 scheme 永远是 http、端口是 8080，
  # 与浏览器 Origin(https:443) 不一致，会被误判为跨域请求并触发 CORS 403
  forward-headers-strategy: native

spring:
  profiles:
    active: local
  # 文件上传大小限制（批量上传最多20张，每张10MB）
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 200MB
  datasource:
    url: jdbc:mysql://101.96.211.131:3306/return_ocr?useSSL=false&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: ${MYSQL_USER:return_ocr}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000
      max-lifetime: 120000
      keepalive-time: 30000
      connection-test-query: SELECT 1
  # 启动时自动执行建表脚本
  sql:
    init:
      mode: always
      continue-on-error: true
      schema-locations: classpath:schema.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

# 智谱OCR（引擎A）
zhipu:
  api-key: ${ZHIPU_API_KEY}

# 阿里云OCR（引擎B）
aliyun:
  ocr:
    access-key-id: ${ALIYUN_AK_ID}
    access-key-secret: ${ALIYUN_AK_SECRET}

# 腾讯云COS
cos:
  secret-id: ${COS_SECRET_ID}
  secret-key: ${COS_SECRET_KEY}
  region: ${COS_REGION:ap-guangzhou}
  bucket: ${COS_BUCKET}

# DeepSeek LLM
deepseek:
  api-key: ${DEEPSEEK_API_KEY}
  base-url: https://api.deepseek.com
  model: deepseek-v4-flash

# 飞书
feishu:
  app-id: ${FEISHU_APP_ID}
  app-secret: ${FEISHU_APP_SECRET}
  app-token: ${FEISHU_APP_TOKEN}
  table-id: ${FEISHU_TABLE_ID}
  bot-webhook: ${FEISHU_BOT_WEBHOOK}

logging:
  level:
    root: INFO
