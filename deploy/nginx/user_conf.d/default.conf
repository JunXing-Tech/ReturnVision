# 退运智录 Nginx 配置（jonasal/nginx-certbot 镜像专用）
# 此文件挂载到 /etc/nginx/user_conf.d/default.conf
# certbot 自动签发的证书由镜像自动管理，无需在此配置 ssl_* 指令

server {
    listen 80;
    listen [::]:80;
    server_name returnvision.jxing.tech;

    client_max_body_size 220m;

    # ========== 前端静态资源 ==========
    location / {
        root /usr/share/nginx/html;
        index index.html;
        # SPA 路由兜底：所有非文件请求都返回 index.html
        try_files $uri $uri/ /index.html;
    }

    # ========== 后端 API 反向代理 ==========
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ⚠️【关键】SSE 流式上传必须关闭 proxy 缓冲，否则前端收不到事件
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
    }

    # Let's Encrypt HTTP 验证（由 nginx-certbot 镜像自动处理）
    location ~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}
