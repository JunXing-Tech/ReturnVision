# 退运智录线上部署编排文件
# 用法：把此目录内容同步到服务器 /www/wwwroot/returnvision/ 后执行 deploy.sh
#
# 架构说明：
#   - backend：JDK21 JRE 运行 jar，仅通过内部网络 rv-net 暴露给 frontend，不对外开端口
#   - frontend：基于 jonasal/nginx-certbot 镜像，兼任 SSL 终端 + 静态托管 + /api 反代
#   - MySQL：宿主机系统级安装（远程 101.96.211.131:3306），不放入 Docker
#   - HTTPS：Let's Encrypt 自动签发与续期，由 jonasal/nginx-certbot 内置 certbot 完成

services:
  backend:
    build: ./returnvision-backend
    image: rv-backend:latest
    container_name: rv-backend
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      # 激活生产 profile（如需区分本地/线上可新增 application-prod.yml）
      - SPRING_PROFILES_ACTIVE=prod
      # 数据源（直接复用 application.yml 中的环境变量占位）
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      # OCR / LLM / COS / 飞书 等密钥
      - ZHIPU_API_KEY=${ZHIPU_API_KEY}
      - ALIYUN_AK_ID=${ALIYUN_AK_ID}
      - ALIYUN_AK_SECRET=${ALIYUN_AK_SECRET}
      - COS_SECRET_ID=${COS_SECRET_ID}
      - COS_SECRET_KEY=${COS_SECRET_KEY}
      - COS_REGION=${COS_REGION}
      - COS_BUCKET=${COS_BUCKET}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - FEISHU_APP_ID=${FEISHU_APP_ID}
      - FEISHU_APP_SECRET=${FEISHU_APP_SECRET}
      - FEISHU_APP_TOKEN=${FEISHU_APP_TOKEN}
      - FEISHU_TABLE_ID=${FEISHU_TABLE_ID}
      - FEISHU_BOT_WEBHOOK=${FEISHU_BOT_WEBHOOK}
    networks:
      - rv-net
    # 故意不映射端口：仅内网可访问，安全收口

  frontend:
    image: jonasal/nginx-certbot:5.2.3
    container_name: rv-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - TZ=Asia/Shanghai
      # Let's Encrypt 证书申请邮箱（用于到期提醒）
      - CERTBOT_EMAIL=${CERTBOT_EMAIL}
      # 自动签发的域名列表（逗号分隔）
      - SERVER_NAME=returnvision.jxing.tech
      # 使用 staging 服务器签发测试证书（避免频繁申请触发限流），正式上线前请设为 false
      - STAGING=${LETSENCRYPT_STAGING:-false}
    volumes:
      # 前端静态资源（只读挂载，避免映射宿主 dist 改动风险）
      - ./returnvision-frontend/dist:/usr/share/nginx/html:ro
      # 自定义 nginx 配置（jonasal 镜像约定路径）
      - ./nginx/user_conf.d:/etc/nginx/user_conf.d:ro
      # 证书与 acme 状态持久化（避免每次重启都重新签发）
      - nginx_secrets:/etc/letsencrypt
    depends_on:
      - backend
    networks:
      - rv-net

networks:
  rv-net:
    driver: bridge

volumes:
  nginx_secrets: